  <script>
    // Unregister any service workers so Capacitor always fetches fresh code from GitHub Pages.

  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.9);color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow-y:auto;text-align:left;';
      errDiv.innerHTML = '<h2>Native App Crash!</h2><br/><b>Message:</b> ' + message + '<br/><br/><b>File:</b> ' + source + ':' + lineno + '<br/><br/><b>Stack:</b> ' + (error ? error.stack : 'N/A');
      document.body.appendChild(errDiv);
    };
    window.addEventListener('unhandledrejection', function (event) {
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.9);color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow-y:auto;text-align:left;';
      errDiv.innerHTML = '<h2>Unhandled Promise Rejection!</h2><br/><b>Reason:</b> ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown') + '<br/><br/><b>Stack:</b> ' + (event.reason ? event.reason.stack : 'N/A');
      document.body.appendChild(errDiv);
    });
  </script>
